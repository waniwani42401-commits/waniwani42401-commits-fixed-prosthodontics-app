<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f6d78">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="固定補綴">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./styles.css">
  <title>固定性補綴学 暗記アプリ</title>
</head>
<body>
<header class="app-header">
  <div><p class="eyebrow">前期定期試験対策</p><h1>固定性補綴学</h1></div>
  <button id="themeBtn" class="icon-btn" aria-label="表示テーマ切替">◐</button>
</header>

<main>
<section class="dashboard card">
  <div class="progress-head"><strong id="resultCount">0問</strong><span id="progressText">学習状況 0 / 0</span></div>
  <div class="progress-bar"><div id="progressFill"></div></div>
  <div class="stats"><span>未学習 <b id="statNew">0</b></span><span>わかった <b id="statKnown">0</b></span><span>分からない <b id="statUnknown">0</b></span></div>
</section>

<section class="filters card">
  <div class="filter-grid">
    <label>学習状況<select id="statusFilter"><option value="all">すべて</option><option value="new">未学習</option><option value="unknown">分からなかった</option><option value="known">わかった</option></select></label>
    <label>並び順<select id="orderFilter"><option value="number">番号順</option><option value="shuffle">シャッフル</option></select></label>
  </div>
  <label class="search-label">検索<input id="searchInput" type="search" placeholder="問題・解答・解説を検索"></label>
  <div class="filter-buttons"><button id="unitFilterBtn" class="secondary">単元を選択 <span id="unitBadge">全9</span></button><button id="importanceFilterBtn" class="secondary">重要度を選択 <span id="importanceBadge">全3</span></button></div>
  <div class="filter-buttons"><button id="summaryBtn" class="secondary">単元まとめ</button><button id="resetFiltersBtn" class="ghost">絞り込み解除</button></div>
</section>

<section id="emptyState" class="card empty hidden"><h2>該当する問題がありません</h2><p>単元・重要度・学習状況・検索条件を変更してください。</p></section>

<section id="studyCard" class="study card">
  <div class="question-meta"><span id="numberChip" class="chip">問1</span><span id="unitChip" class="chip neutral"></span><span id="importanceChip" class="chip importance"></span></div>
  <p id="sourceText" class="source"></p>
  <h2 id="questionText"></h2>
  <div class="media-buttons"><button id="figureBtn" class="figure-btn hidden">図・写真を表示</button><button id="sourcePageBtn" class="figure-btn secondary hidden">対応資料ページを表示</button></div>
  <div id="figureBox" class="figure-box hidden"><img id="figureImage" alt="問題に使用する図・写真"></div>
  <div id="sourcePageBox" class="figure-box hidden"><div id="sourcePageCaption" class="source-caption"></div><img id="sourcePageImage" alt="対応する資料ページ"></div>
  <div id="mcqBox" class="mcq-box hidden"></div>
  <button id="answerBtn" class="answer-btn">解答を見る</button>
  <div id="answerBox" class="answer-box hidden"><p class="answer-label">解答</p><p id="answerText" class="answer"></p><p class="answer-label">解説</p><p id="explanationText"></p></div>
  <div class="judge-row"><button id="unknownBtn" class="judge unknown">分からなかった</button><button id="knownBtn" class="judge known">わかった</button></div>
  <div class="nav-row"><button id="prevBtn" class="secondary">前の問題</button><span id="positionText">1 / 1</span><button id="nextBtn" class="primary">次の問題</button></div>
  <div class="edit-row"><button id="editBtn" class="ghost">この問題を編集</button><button id="deleteBtn" class="danger-ghost">削除</button></div>
</section>

<section class="manage card">
  <h2>問題管理</h2>
  <div class="manage-grid"><button id="addBtn" class="primary">＋ 問題を追加</button><button id="exportBtn" class="secondary">バックアップを書き出す</button><label class="file-button secondary">バックアップを読み込む<input id="importInput" type="file" accept="application/json"></label><button id="resetDataBtn" class="danger-ghost">初期問題へ戻す</button></div>
  <p class="small">編集・追加・進捗はこの端末に保存されます。別端末へ移す場合はバックアップを利用してください。</p>
</section>
</main>

<dialog id="checkDialog" class="dialog"><form method="dialog"><div class="dialog-head"><h2 id="checkTitle">選択</h2><button value="cancel" class="icon-btn">×</button></div><div id="checkList" class="check-list"></div><div class="dialog-actions"><button id="selectAllBtn" type="button" class="ghost">すべて選択</button><button id="clearAllBtn" type="button" class="ghost">すべて解除</button><button value="apply" class="primary">適用</button></div></form></dialog>

<dialog id="summaryDialog" class="dialog wide"><form method="dialog"><div class="dialog-head"><h2>単元まとめ</h2><button value="cancel" class="icon-btn">×</button></div><div id="summaryContent"></div><div class="dialog-actions"><button value="close" class="primary">閉じる</button></div></form></dialog>

<dialog id="editDialog" class="dialog wide"><form id="editForm"><div class="dialog-head"><h2 id="editTitle">問題を編集</h2><button type="button" id="closeEditBtn" class="icon-btn">×</button></div>
  <div class="form-grid"><label>単元<select id="editUnit" required></select></label><label>重要度<select id="editImportance"><option value="3">★★★ 最重要</option><option value="2">★★ 重要</option><option value="1">★ 補足</option></select></label><label>形式<select id="editType"><option value="short">一問一答</option><option value="mcq">選択問題</option></select></label><label>出典<input id="editSource" type="text"></label></div>
  <label>問題文<textarea id="editQuestion" rows="4" required></textarea></label>
  <div id="shortFields"><label>解答<input id="editAnswer" type="text"></label></div>
  <div id="mcqFields" class="hidden"><label>選択肢（1行につき「a 選択肢」の形式）<textarea id="editOptions" rows="6"></textarea></label><label>正解記号（複数は a,c の形式）<input id="editCorrect" type="text"></label></div>
  <label>解説<textarea id="editExplanation" rows="4"></textarea></label>
  <label>図・写真<input id="editImageFile" type="file" accept="image/*"></label><div class="image-edit-row"><span id="currentImageText">画像なし</span><button type="button" id="removeImageBtn" class="ghost">画像を外す</button></div>
  <div class="dialog-actions"><button type="button" id="cancelEditBtn" class="ghost">キャンセル</button><button type="submit" class="primary">保存</button></div>
</form></dialog>

<div id="toast" class="toast hidden"></div>
<script src="./data.js"></script><script src="./app.js"></script>
</body></html>
